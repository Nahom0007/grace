<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#EAC7CF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Grace Touch Spa">
  <title>Grace Touch Mobile Spa</title>
  <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22Grace%20Touch%20Mobile%20Spa%22%2C%22short_name%22%3A%22Grace%20Touch%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23FFFFFF%22%2C%22theme_color%22%3A%22%23EAC7CF%22%7D">
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    :root {
      --primary: #EAC7CF;
      --secondary: #D8A7B1;
      --accent: #C79BA5;
      --bg: #FFF5F6;
      --bg-light: #FFFBFB;
      --text: #2D2526;
      --text-muted: #8E7C7E;
      --success: #6E8E75;
      --warning: #D9A773;
      --error: #C96868;
      --radius: 24px;
      --radius-sm: 12px;
      --shadow: 0 10px 30px rgba(216, 167, 177, 0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg-light); color: var(--text); min-height: 100vh; }
    h1,h2,h3,h4 { font-family: 'Playfair Display', serif; }
    
    @keyframes premiumFadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* === LAYOUT === */
    #app { display: flex; height: 100vh; overflow: hidden; background: var(--bg-light); }
    #sidebar { width: 260px; background: var(--bg); border-right: 1px solid #f0e8eb; display: flex; flex-direction: column; transition: transform .3s; z-index: 100; }
    #main { flex: 1; overflow-y: auto; background: var(--bg-light); display: none; }

    /* === SIDEBAR === */
    .sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid #f0e8eb; display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 26px; height: 26px; fill: white; }
    .logo-text h2 { font-size: 14px; color: var(--text); line-height: 1.2; }
    .logo-text span { font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; }
    .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
    .nav-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 8px 12px 4px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 2px; font-size: 13.5px; font-weight: 500; color: var(--text-muted); transition: all .2s; border: none; background: none; width: 100%; text-align: left; }
    .nav-item:hover { background: var(--bg-light); color: var(--text); }
    .nav-item.active { background: linear-gradient(135deg, #faedf0, #f5e0e6); color: #b06070; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; fill: currentColor; }
    .nav-badge { margin-left: auto; background: var(--secondary); color: white; font-size: 10px; padding: 2px 7px; border-radius: 10px; }
    .sidebar-user { padding: 16px; border-top: 1px solid #f0e8eb; display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: white; flex-shrink: 0; }
    .user-info { flex: 1; min-width: 0; }
    .user-info strong { font-size: 13px; display: block; }
    .user-info span { font-size: 11px; color: var(--text-muted); }
    .logout-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; }

    /* === TOP BAR === */
    #topbar { background: var(--bg); padding: 16px 28px; border-bottom: 1px solid #f0e8eb; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50; }
    #topbar h1 { font-size: 22px; flex: 1; }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .btn { padding: 9px 18px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 500; transition: all .2s; }
    .btn-primary { background: linear-gradient(135deg, var(--secondary), var(--accent)); color: white; }
    .btn-primary:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(215,167,177,.4); }
    .btn-secondary { background: var(--bg-light); color: var(--text); border: 1px solid #e8d8dc; }
    .btn-secondary:hover { background: #f0e8eb; }

    /* === CONTENT === */
    #content { padding: 28px; }

    /* === LOGIN === */
    #login-screen { min-height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #fdf0f3 0%, #f5e8ec 50%, #ffe8f0 100%); padding: 20px; box-sizing: border-box; }
    .login-card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 20px 50px rgba(216, 167, 177, 0.15); padding: 40px 32px; border-radius: var(--radius); width: 100%; max-width: 420px; box-sizing: border-box; animation: premiumFadeUp 0.8s ease-out forwards; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo-icon { width: 72px; height: 72px; border-radius: 20px; background: linear-gradient(135deg, var(--primary), var(--accent)); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; }
    .login-logo-icon svg { width: 40px; height: 40px; fill: white; }
    .login-logo h1 { font-size: 26px; color: var(--text); }
    .login-logo p { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; margin-top: 4px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 7px; }
    input[type=text], input[type=password] { width: 100%; padding: 11px 14px; border: 1.5px solid #e8d8dc; border-radius: var(--radius-sm); font-family: 'Poppins', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); transition: border-color .2s, box-shadow .2s; outline: none; box-sizing: border-box; }
    input:focus { border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(216,167,177,.15); }
    .login-roles { display: flex; gap: 8px; margin-bottom: 24px; }
    .role-chip { flex: 1; padding: 8px; text-align: center; border-radius: 8px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1.5px solid #e8d8dc; color: var(--text-muted); transition: all .2s; background: var(--bg-light); }
    .role-chip.active { border-color: var(--secondary); background: #faedf0; color: #b06070; }
    .login-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--secondary), var(--accent)); color: white; border: none; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.3s ease; font-family: 'Poppins', sans-serif; font-weight: 500; }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(216,167,177,0.5); opacity: 0.95; }
    .demo-note { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 20px; line-height: 1.5; }
    .demo-note strong { color: var(--accent); }

    /* === DASHBOARD CONTENT === */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 28px; }
    .kpi-card { background: white; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); border: 1px solid #fdf0f3; }
    .kpi-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .kpi-value { font-size: 28px; font-weight: 600; color: var(--text); margin: 8px 0 4px; }
    .kpi-subtext { font-size: 11px; color: var(--success); font-weight: 500; }
  </style>
</head>
<body>

  <div id="app">
    <!-- LOGIN SCREEN -->
    <div id="login-screen">
      <div class="login-card">
        <div class="login-logo">
          <div class="login-logo-icon">
            <svg viewBox="0 0 40 40"><path d="M12 32 Q12 18 20 14 Q28 18 28 32" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/><line x1="16" y1="8" x2="16" y2="20" stroke="white" stroke-width="1.5"/><line x1="20" y1="7" x2="20" y2="20" stroke="white" stroke-width="1.5"/><line x1="24" y1="8" x2="24" y2="20" stroke="white" stroke-width="1.5"/></svg>
          </div>
          <h1>Grace Touch</h1>
          <p>Health & Wellness</p>
        </div>
        
        <div class="login-roles" id="role-selector">
          <div class="role-chip active" onclick="selectRole('admin', this)">Admin</div>
          <div class="role-chip" onclick="selectRole('receptionist', this)">Receptionist</div>
          <div class="role-chip" onclick="selectRole('therapist', this)">Therapist</div>
        </div>

        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-user" value="admin">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-pass" value="••••••••">
        </div>

        <button class="login-btn" onclick="doLogin()">Sign In to Grace Touch</button>
        <p class="demo-note">Demo credentials: <strong>admin</strong> / any password<br>Select a role above to preview different access levels</p>
      </div>
    </div>
